name: 📸 Update Screenshots

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  screenshots:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect frontend changes since last screenshot update
        id: changes
        run: |
          set -euo pipefail

          SCREENSHOT_PATH="public/assets/screenshots/iPhone_13_Pro_Max.jpeg"
          LAST_SCREENSHOT_COMMIT=$(git log -n 1 --format=%H -- "$SCREENSHOT_PATH" || true)

          if [ -z "$LAST_SCREENSHOT_COMMIT" ]; then
            echo "No existing screenshot commit found. Running screenshot update."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FRONTEND_CHANGES=$(git diff --name-only "$LAST_SCREENSHOT_COMMIT"..HEAD -- \
            src \
            public \
            angular.json \
            package.json \
            yarn.lock \
            tsconfig.json \
            tsconfig.app.json \
            tsconfig.spec.json | grep -v '^public/assets/screenshots/' || true)

          if [ -z "$FRONTEND_CHANGES" ]; then
            echo "No frontend-impacting changes since last screenshot update. Skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Detected frontend-impacting changes:"
            echo "$FRONTEND_CHANGES"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.changes.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        if: steps.changes.outputs.should_run == 'true'
        run: yarn install --frozen-lockfile

      - name: Build application
        if: steps.changes.outputs.should_run == 'true'
        run: yarn build

      - name: Install serve
        if: steps.changes.outputs.should_run == 'true'
        run: yarn global add serve

      - name: Start server in background
        if: steps.changes.outputs.should_run == 'true'
        run: |
          cd dist/3dime-angular/browser
          serve -s . -l 4200 &
          echo "Waiting for server to start..."
          sleep 15
          echo "Server should be ready now"
          # Health check with retry
          for i in {1..5}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:4200 | grep -q "200"; then
              echo "Server is responding with HTTP 200"
              break
            else
              echo "Attempt $i: Server not ready yet, waiting 2 more seconds..."
              sleep 2
            fi
          done

      - name: Check server response before screenshots
        if: steps.changes.outputs.should_run == 'true'
        run: |
          sleep 5
          curl -i http://localhost:4200

      - name: Install puppeteer-headful
        if: steps.changes.outputs.should_run == 'true'
        uses: mujo-code/puppeteer-headful@master
        env:
          CI: 'true'

      - name: Generate screenshots
        if: steps.changes.outputs.should_run == 'true'
        uses: flameddd/screenshots-ci-action@master
        with:
          url: http://localhost:4200
          devices: iPhone 13 Pro Max
          noCommitHashFileName: true
          # networkidle0: Wait for all network connections to finish (stricter than networkidle2)
          # This ensures all external resources (Font Awesome, d3.js, etc.) are loaded
          # Note: API timeouts added to services (10s) to prevent indefinite waiting
          waitUntil: networkidle0
          # app-contact is the last component in the layout, ensuring full page render
          # Components now have timeout handling to render even when APIs fail
          waitForSelector: 'app-contact'
          # Extended timeout to allow for Angular bootstrap, API calls (with timeouts), and fallback rendering
          # Increased from 90s to 120s to account for slower CI environments
          waitForSelectorTimeout: 120000

      - name: Crop mobile screenshot
        if: steps.changes.outputs.should_run == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          convert screenshots/iPhone_13_Pro_Max.jpeg -crop 1284x2200+0+0 screenshots/iPhone_13_Pro_Max.jpeg

      - name: Verify screenshots have content
        if: steps.changes.outputs.should_run == 'true'
        run: |
          echo "Checking mobile screenshot..."
          identify -verbose screenshots/iPhone_13_Pro_Max.jpeg | grep -E "Geometry|Format"

          MOBILE_SIZE=$(stat -f%z screenshots/iPhone_13_Pro_Max.jpeg 2>/dev/null || stat -c%s screenshots/iPhone_13_Pro_Max.jpeg)
          echo "Mobile screenshot size: $MOBILE_SIZE bytes"

          if [ $MOBILE_SIZE -lt 51200 ]; then
            echo "WARNING: Mobile screenshot seems too small (< 50KB), might be empty"
          fi

          echo "Screenshot verified successfully"

      - name: Compare screenshots against current versions
        if: steps.changes.outputs.should_run == 'true'
        id: compare
        run: |
          set -euo pipefail

          THRESHOLD="0.003"
          HAS_CHANGES="false"

          compare_screenshot() {
            local CURRENT="$1"
            local CANDIDATE="$2"
            local LABEL="$3"

            if [ ! -f "$CURRENT" ]; then
              echo "$LABEL: No existing screenshot found, update required."
              HAS_CHANGES="true"
              return
            fi

            set +e
            COMPARE_OUTPUT=$(compare -metric RMSE "$CURRENT" "$CANDIDATE" null: 2>&1)
            COMPARE_EXIT=$?
            set -e

            if [ "$COMPARE_EXIT" -eq 2 ]; then
              echo "$LABEL: Image comparison failed: $COMPARE_OUTPUT"
              exit 1
            fi

            DIFF=$(echo "$COMPARE_OUTPUT" | awk -F'[()]' '{print $2}')
            echo "$LABEL — Normalized RMSE: $DIFF (threshold: $THRESHOLD)"

            if awk -v d="$DIFF" -v t="$THRESHOLD" 'BEGIN { exit !(d > t) }'; then
              echo "$LABEL: Visual change detected."
              HAS_CHANGES="true"
            else
              echo "$LABEL: No meaningful visual change detected."
            fi
          }

          compare_screenshot \
            "public/assets/screenshots/iPhone_13_Pro_Max.jpeg" \
            "screenshots/iPhone_13_Pro_Max.jpeg" \
            "Mobile"

          echo "has_changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"

      - name: Move screenshots into public/assets/screenshots
        if: steps.changes.outputs.should_run == 'true' && steps.compare.outputs.has_changes == 'true'
        run: |
          mkdir -p public/assets/screenshots
          mv screenshots/iPhone_13_Pro_Max.jpeg public/assets/screenshots/

      - name: Create Pull Request to main
        if: steps.changes.outputs.should_run == 'true' && steps.compare.outputs.has_changes == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: Update screenshots [skip ci]
          branch: update-screenshots-assets
          base: main
          title: Update screenshots
          body: Automated update of screenshots.
          add-paths: public/assets/screenshots/
          labels: ''

      - name: Auto-merge Pull Request (squash with fixed message)
        if: steps.changes.outputs.should_run == 'true' && steps.compare.outputs.has_changes == 'true' && steps.cpr.outputs.pull-request-number
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} \
            --squash \
            --admin \
            --delete-branch \
            --body "Update screenshots [skip ci]" \
            --subject "Update screenshots [skip ci]"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No-op summary
        if: steps.changes.outputs.should_run != 'true' || steps.compare.outputs.has_changes == 'false'
        run: |
          if [ "${{ steps.changes.outputs.should_run }}" != "true" ]; then
            echo "Skipped: no frontend-impacting changes since last screenshot update."
          else
            echo "Skipped: generated screenshots are visually equivalent to current screenshots."
          fi
