<article class="container" aria-labelledby="profile-heading" id="profile-section">
  @if (isLoading) {
    <div class="profile-skeleton">
      <app-skeleton-loader type="avatar" />
      <app-skeleton-loader type="text" [width]="'150px'" [height]="'2rem'" />
      <app-skeleton-loader type="chip" [count]="4" />
    </div>
  } @else {
    <header class="profile-header">
      <img [src]="avatar" alt="Profile avatar" class="logo" />

      <!-- New ng-bootstrap dropdown menu -->
      <nav class="settings-menu" ngbDropdown placement="bottom-end" aria-label="Profile options">
        <button
          class="menu-toggle-button"
          ngbDropdownToggle
          aria-label="Open settings menu"
          type="button"
        >
          @if (isAuthenticated && currentUser) {
            <img
              [src]="currentUser.photoURL"
              [alt]="currentUser.displayName || 'User avatar'"
              class="user-avatar"
            />
          } @else {
            <i class="fas fa-cog" aria-hidden="true"></i>
          }
        </button>

        <!-- Dropdown menu -->
        <div ngbDropdownMenu class="settings-dropdown" aria-label="Settings menu">
          @if (isAuthenticated && currentUser) {
            <div class="user-info-section">
              <div class="user-details">
                <div class="user-name">{{ currentUser.displayName }}</div>
                <div class="user-email">{{ currentUser.email }}</div>
              </div>
            </div>
            <div class="dropdown-divider"></div>
          }

          <button
            ngbDropdownItem
            class="menu-item theme-item"
            (click)="cycleTheme()"
            type="button"
          >
            <i
              class="fas item-icon"
              [class.fa-moon]="currentTheme === 'dark'"
              [class.fa-sun]="currentTheme === 'white'"
              [class.fa-gem]="currentTheme === 'glass'"
              aria-hidden="true"
            ></i>
            <span class="item-label">Theme</span>
            <span class="item-value">{{ themeDisplayName }}</span>
          </button>

          <button
            ngbDropdownItem
            class="menu-item background-item"
            (click)="toggleVideoBg()"
            type="button"
          >
            <i
              class="fas item-icon"
              [class.fa-circle]="currentBackground === 'black'"
              [class.fa-circle-notch]="currentBackground === 'white'"
              [class.fa-play]="currentBackground === 'video'"
              aria-hidden="true"
            ></i>
            <span class="item-label">Background</span>
            <span class="item-value">{{ backgroundDisplayName }}</span>
          </button>

          <button
            ngbDropdownItem
            class="menu-item font-size-item"
            (click)="changeFontSize()"
            type="button"
          >
            <i class="fas fa-text-height item-icon" aria-hidden="true"></i>
            <span class="item-label">Font Size</span>
            <span class="item-value">{{ fontSizeDisplayName }}</span>
          </button>

          @if (isAuthenticated) {
            <div class="dropdown-divider"></div>

            <button
              ngbDropdownItem
              class="menu-item sign-out-item"
              (click)="signOut()"
              ngbTooltip="Sign out of your account"
              placement="left"
              container="body"
              type="button"
            >
              <i class="fas fa-sign-out-alt item-icon" aria-hidden="true"></i>
              <span class="item-label">Sign Out</span>
            </button>
          }
        </div>
      </nav>
    </header>

    <h1 id="profile-heading">✨ 3dime ✨</h1>
    <nav class="socials" aria-label="Social media links">
      @for (link of socialLinks; track link.provider) {
        <a
          [href]="link.url"
          target="_blank"
          rel="noopener noreferrer"
          [attr.aria-label]="link.provider + ' profile'"
        >
          <i [class]="getFontAwesomeLinks(link.provider)" aria-hidden="true"></i>
        </a>
      } @empty {
        <p class="empty-state">Social links will be displayed here.</p>
      }
    </nav>
  }
</article>
